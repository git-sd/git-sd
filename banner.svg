<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380" fill="none" role="img" aria-label="Shreyan Das - Tokyo Night">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1b26"/>
      <stop offset="0.55" stop-color="#20222f"/>
      <stop offset="1" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="glowline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7dcfff"/>
      <stop offset="1" stop-color="#bb9af7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c0caf5"/>
      <stop offset="0.7" stop-color="#a9b1d6"/>
      <stop offset="1" stop-color="#7aa2f7" stop-opacity="0.15"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- sky -->
  <rect width="1200" height="380" fill="url(#sky)"/>

  <!-- moon + halo -->
  <circle cx="1010" cy="92" r="46" fill="#7aa2f7" opacity="0.12" filter="url(#soft)"/>
  <circle cx="1010" cy="92" r="30" fill="url(#moon)"/>
  <circle cx="1024" cy="84" r="30" fill="#20222f"/>

  <!-- stars -->
  <g fill="#c0caf5">
    <circle cx="90"  cy="60"  r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="40"  r="1.1"><animate attributeName="opacity" values="1;0.3;1"   dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="90"  r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="50"  r="1.2"><animate attributeName="opacity" values="1;0.2;1"   dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="30"  r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="5.0s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="80"  r="1.1"><animate attributeName="opacity" values="1;0.4;1"   dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="120" r="1.0"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="55"  r="1.5"><animate attributeName="opacity" values="1;0.2;1"   dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="130" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.0s" repeatCount="indefinite"/></circle>
    <circle cx="410" cy="140" r="1.0"><animate attributeName="opacity" values="1;0.3;1"   dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1120" cy="60" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.8s" repeatCount="indefinite"/></circle>
    <circle cx="40"  cy="160" r="1.1"><animate attributeName="opacity" values="1;0.2;1"   dur="3.0s" repeatCount="indefinite"/></circle>
  </g>

  <!-- drifting clouds -->
  <g fill="#7aa2f7" opacity="0.08" filter="url(#soft)">
    <g><animateTransform attributeName="transform" type="translate" values="-200 0; 1400 0" dur="60s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="150" rx="90" ry="16"/><ellipse cx="70" cy="140" rx="60" ry="14"/></g>
    <g><animateTransform attributeName="transform" type="translate" values="-400 0; 1400 0" dur="85s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="200" rx="110" ry="18"/><ellipse cx="90" cy="188" rx="70" ry="15"/></g>
  </g>

  <!-- far skyline -->
  <g fill="#1e2030">
    <rect x="0"   y="250" width="60"  height="130"/>
    <rect x="70"  y="220" width="50"  height="160"/>
    <rect x="130" y="265" width="70"  height="115"/>
    <rect x="215" y="235" width="55"  height="145"/>
    <rect x="285" y="270" width="80"  height="110"/>
    <rect x="380" y="245" width="60"  height="135"/>
    <rect x="455" y="225" width="50"  height="155"/>
    <rect x="520" y="260" width="75"  height="120"/>
    <rect x="610" y="240" width="55"  height="140"/>
    <rect x="680" y="268" width="70"  height="112"/>
    <rect x="765" y="230" width="55"  height="150"/>
    <rect x="835" y="258" width="80"  height="122"/>
    <rect x="930" y="242" width="60"  height="138"/>
    <rect x="1005" y="262" width="70" height="118"/>
    <rect x="1090" y="238" width="60" height="142"/>
  </g>

  <!-- near skyline (taller, darker) -->
  <g fill="#16161e">
    <rect x="20"  y="300" width="90"  height="80"/>
    <rect x="130" y="285" width="80"  height="95"/>
    <rect x="235" y="305" width="100" height="75"/>
    <rect x="360" y="290" width="85"  height="90"/>
    <rect x="470" y="308" width="95"  height="72"/>
    <rect x="590" y="288" width="80"  height="92"/>
    <rect x="695" y="302" width="105" height="78"/>
    <rect x="825" y="292" width="85"  height="88"/>
    <rect x="935" y="306" width="95"  height="74"/>
    <rect x="1055" y="290" width="90" height="90"/>
  </g>

  <!-- window lights (flickering) -->
  <g fill="#7dcfff">
    <rect x="82"  y="240" width="6" height="8"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="4s" repeatCount="indefinite"/></rect>
    <rect x="98"  y="255" width="6" height="8" opacity="0.7"/>
    <rect x="230" y="250" width="6" height="8"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="5s" repeatCount="indefinite"/></rect>
    <rect x="245" y="270" width="6" height="8" opacity="0.6"/>
    <rect x="470" y="240" width="6" height="8"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.4s" repeatCount="indefinite"/></rect>
    <rect x="620" y="255" width="6" height="8" opacity="0.7"/>
    <rect x="780" y="245" width="6" height="8"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.6s" repeatCount="indefinite"/></rect>
    <rect x="945" y="258" width="6" height="8" opacity="0.6"/>
    <rect x="1105" y="252" width="6" height="8"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.8s" repeatCount="indefinite"/></rect>
  </g>
  <g fill="#bb9af7">
    <rect x="150" y="300" width="6" height="8" opacity="0.7"/>
    <rect x="390" y="305" width="6" height="8"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4.2s" repeatCount="indefinite"/></rect>
    <rect x="720" y="315" width="6" height="8" opacity="0.6"/>
    <rect x="855" y="308" width="6" height="8"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.6s" repeatCount="indefinite"/></rect>
    <rect x="1075" y="305" width="6" height="8" opacity="0.7"/>
  </g>
  <g fill="#e0af68">
    <rect x="260" y="320" width="6" height="8" opacity="0.6"/>
    <rect x="500" y="322" width="6" height="8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="5.2s" repeatCount="indefinite"/></rect>
    <rect x="960" y="320" width="6" height="8" opacity="0.6"/>
  </g>

  <!-- water reflection line -->
  <rect x="0" y="378" width="1200" height="2" fill="url(#glowline)" opacity="0.6"/>

  <!-- neon name -->
  <g filter="url(#neon)">
    <text x="70" y="180" font-family="'Segoe UI', Verdana, sans-serif" font-size="76" font-weight="800" letter-spacing="3" fill="#7aa2f7">
      SHREYAN DAS
      <animate attributeName="opacity" values="0;1;0.85;1" dur="2.2s" fill="freeze"/>
    </text>
  </g>
  <text x="74" y="216" font-family="'Segoe UI', Verdana, sans-serif" font-size="21" font-weight="500" letter-spacing="6" fill="#7dcfff">
    student &#183; builder &#183; bangalore
    <animate attributeName="opacity" values="0;0;1" dur="2.6s" fill="freeze"/>
  </text>

  <!-- accent underline draw-in -->
  <rect x="74" y="228" width="0" height="3" rx="1.5" fill="url(#glowline)">
    <animate attributeName="width" values="0;360" dur="1.4s" begin="0.6s" fill="freeze"/>
  </rect>
</svg>
